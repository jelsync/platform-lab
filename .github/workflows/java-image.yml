name: Build and publish Java image

on:
  push:
    branches:
      - main
    paths:
      - "app/java-demo/**"
      - ".github/workflows/java-image.yml"

  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/platform-lab-java

jobs:
  build-and-publish:
    name: Build and publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Grant execution permission to Maven Wrapper
        working-directory: app/java-demo
        run: chmod +x mvnw

      - name: Compile and package
        working-directory: app/java-demo
        run: ./mvnw --batch-mode clean package

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=1.0.${{ github.run_number }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: app/java-demo
          file: app/java-demo/Dockerfile
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}