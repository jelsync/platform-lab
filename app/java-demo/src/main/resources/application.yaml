server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: demo
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: ${SPRING_CONFIG_IMPORT:optional:aws-secretsmanager:dev/sorteos/producto}
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator

  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
info:
  app:
    name: ${spring.application.name}
    version: ${project.version}
