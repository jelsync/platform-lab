apiVersion: v1
kind: Service
metadata:
  name: java-demo-service
  namespace: platform-lab
  labels:
    app: java-demo
    app.kubernetes.io/name: java-demo
    app.kubernetes.io/part-of: platform-lab
spec:
  type: ClusterIP

  selector:
    app: java-demo

  ports:
    - name: http
      protocol: TCP
      port: 8081
      targetPort: http