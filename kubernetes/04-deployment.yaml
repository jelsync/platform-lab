apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-demo
  namespace: platform-lab
  labels:
    app: nginx-demo
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: platform-lab
spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-demo

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  template:
    metadata:
      labels:
        app: nginx-demo
        app.kubernetes.io/name: nginx
        app.kubernetes.io/part-of: platform-lab

    spec:
      serviceAccountName: nginx-demo-sa
      automountServiceAccountToken: false
      containers:
        - name: nginx
          image: nginx:1.28-alpine
          imagePullPolicy: IfNotPresent

          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          env:
            - name: DEMO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: nginx-demo-secret
                  key: DEMO_USERNAME

            - name: DEMO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nginx-demo-secret
                  key: DEMO_PASSWORD

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3

          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          volumeMounts:
            - name: nginx-content-volume
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
              readOnly: true

      volumes:
        - name: nginx-content-volume
          configMap:
            name: nginx-content
    