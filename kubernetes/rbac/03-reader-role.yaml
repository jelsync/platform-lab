apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: platform-reader-role
  namespace: platform-lab
  labels:
    app.kubernetes.io/part-of: platform-lab
rules:
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch

  - apiGroups:
      - ""
    resources:
      - pods/log
    verbs:
      - get

  - apiGroups:
      - apps
    resources:
      - deployments
      - replicasets
    verbs:
      - get
      - list
      - watch