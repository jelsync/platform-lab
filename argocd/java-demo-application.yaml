apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: java-demo
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/jelsync/platform-lab.git
    targetRevision: main
    path: kubernetes/java-app
    directory:
      recurse: true
      exclude: "02-secret.example.yaml"

  destination:
    server: https://kubernetes.default.svc
    namespace: platform-lab

  syncPolicy:
    syncOptions:
      - CreateNamespace=true